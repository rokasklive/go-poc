name: Release

# Tag-triggered release. Push a tag like `v0.0.1` and this workflow builds all
# four target binaries from a single Linux runner and publishes them to a
# GitHub Release for that tag.
#
#   git tag v0.0.1
#   git push origin v0.0.1
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  release:
    name: Build all platforms and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Native Linux build needs CGO + GTK3 + WebKit2GTK dev headers.
      # Windows is a pure Go cross-compile (no extra deps).
      # macOS is cross-compiled inside the wails-cross Docker image, which the
      # build script builds on demand (Docker is preinstalled on this runner).
      # GTK4 (+ webkitgtk-6.0) is required to BUILD the wails3 CLI itself
      # (internal/operatingsystem uses cgo against gtk4/webkitgtk-6.0). GTK3
      # (+ webkit2gtk-4.1) is needed for the native Linux app build. Install
      # both, matching build/docker/Dockerfile.cross.
      - name: Install Linux GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install Wails v3 CLI (pinned)
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104

      - name: Build all target platforms from Linux
        # The script verifies each artifact exists and exits non-zero on any
        # failure, so a broken target fails the release rather than shipping
        # silently. Artifacts land in ./dist.
        run: ./scripts/build-all-linux.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
